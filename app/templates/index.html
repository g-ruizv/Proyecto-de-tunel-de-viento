<!DOCTYPE html>
<html lang="en">
    <script src="./static/node_modules/gridstack/dist/gridstack-all.js"></script>
    <link href="./static/node_modules/gridstack/dist/gridstack.min.css" rel="stylesheet"/>
<head>
    <link rel="shortcut icon" href="./static/favicon.ico">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FanWall</title>
    <link href ="./static/css/index.css" rel="stylesheet"/>
    <!-- Bootstrap CSS -->
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <link href="./static/node_modules/bootstrap/dist/css/bootstrap.min.css" rel="stylesheet"/>
    <script src="./static/node_modules/@popperjs/core/dist/umd/popper.js" rel="stylesheet"></script>
    <script src="./static/node_modules/bootstrap/dist/js/bootstrap.bundle.js"></script>
    
    
    <!-- Paho JavaScript MQTT Library -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/paho-mqtt/1.0.1/mqttws31.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/socket.io/4.7.2/socket.io.js"></script>
</head>
<body class="container mt-6">
    <h1 class="mb-4">FanWall</h1>
    <div class="row">
        <div class="col-md-2">
            <p>Status: <span id="status">-</span></p>
        </div>
        <div class="col-md-6">
            <button class="btn btn-primary mr-2" onclick="startProcedure()">Start Procedure</button>
            <button class="btn btn-primary" onclick="getAllControllers()">Get controllers</button>
            <button class="btn btn-primary" onclick="addMultipleControllers()">Get controllers</button>
        </div>
        <div class="col-md-2">
            <div class="dropdown">
                <button class="btn btn-secondary dropdown-toggle" type="button" id="dropdownMenuButton" data-toggle="dropdown" aria-haspopup="true" aria-expanded="false">
                    Select Configuration
                </button>
                <div class="dropdown-menu" id="configDropdown" aria-labelledby="dropdownMenuButton"></div>
            </div >
            
        </div>
        <div class="col-md-2">
            <div class="d-flex justify-content-end">
                <button class="btn btn-primary  ml-auto"  onclick="saveConfiguration(2)">Save</button>
                <button type="button" class="btn btn-primary" data-bs-toggle="modal" data-bs-target="#exampleModal">
                    Create New
                </button>
            </div>
        </div>
    </div>
    <div class="row">
        <div class="col-md-3">
        </div>
    </div>
    
    <div class="grid-stack" gs-w="3" gs-min-row="12"></div>
    <!-- Button trigger modal -->
    
    
    <!-- Modal -->
    <div class="modal fade" id="exampleModal" tabindex="-1" aria-labelledby="exampleModalLabel" aria-hidden="true">
        <div class="modal-dialog">
        <div class="modal-content">
            <div class="modal-header">
            <h5 class="modal-title" id="exampleModalLabel">New config</h5>
            <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
            </div>
            <div class="modal-body">
                <label for="newConfigurationNameInputBox">Configuration name</label>
                <input type="text" class="form-control" id="newConfigurationNameInputBox" placeholder="Grid 1">
            </div>
            <div class="modal-footer">
            <button class="btn btn-primary  ml-auto"  onclick="saveConfiguration()">Create</button>
            </div>
        </div>
        </div>
    </div>

    <script src="./static/js/mqtt.js"></script>
    <script src="./static/js/configurations.js"></script>
    <script src="./static/js/mqttMessageManager.js"></script>
    <script src="./static/js/socketio.js"></script>
    <script src="./static/js/socketMessageManager.js"></script>
    <script src="./static/js/ui.js"></script>
    <script src="./static/js/requests.js"></script>
</body>
</html>
